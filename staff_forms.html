<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#cc0000">
<title>KAEFER — Submit a Form</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--r:#cc0000;--rd:#990000;--g:#1a1a1a;--bd:#e0e0e0;--blue:#1a2a4a;--orange:#e65100;--green:#2e7d32}
body{font-family:Arial,sans-serif;background:#f0f0f0;color:#1a1a1a;font-size:14px;min-height:100vh}
header{background:var(--g);border-bottom:4px solid var(--r);display:flex;align-items:stretch}
.logo{background:var(--r);padding:0 18px;display:flex;flex-direction:column;align-items:center;justify-content:center;min-width:80px}
.lt{font-size:20px;font-weight:900;color:#fff;letter-spacing:4px}
.ls{font-size:7px;color:rgba(255,255,255,.8);letter-spacing:2px;text-transform:uppercase;margin-top:3px}
.hm{padding:12px 14px}
.hm h1{font-size:15px;font-weight:700;color:#fff;text-transform:uppercase;letter-spacing:.5px}
.hm p{font-size:11px;color:#b0bec5;margin-top:2px}
.w{max-width:600px;margin:0 auto;padding:16px}

/* Form selector */
.form-btns{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:18px}
.form-btn{padding:14px 8px;border:2px solid var(--bd);border-radius:8px;background:#fff;cursor:pointer;text-align:center;font-family:inherit;transition:all .15s}
.form-btn.active-leave{border-color:var(--blue);background:#e8edf5}
.form-btn.active-ppe{border-color:var(--orange);background:#fff3e0}
.form-btn.active-purch{border-color:var(--green);background:#e8f5e9}
.form-btn .icon{font-size:24px;display:block;margin-bottom:5px}
.form-btn .lbl{font-size:11px;font-weight:700;color:#37474f;text-transform:uppercase;letter-spacing:.3px}

/* Cards */
.card{background:#fff;border-radius:8px;overflow:hidden;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.1)}
.card-hdr{padding:10px 14px;color:#fff;font-size:12px;font-weight:700;letter-spacing:.5px;text-transform:uppercase}
.card-hdr.blue{background:var(--blue)}
.card-hdr.orange{background:var(--orange)}
.card-hdr.green{background:var(--green)}
.card-body{padding:14px}

/* Fields */
.field{margin-bottom:12px}
.field label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:#607d8b;margin-bottom:4px}
.field input,.field select,.field textarea{width:100%;padding:10px 12px;border:1.5px solid var(--bd);border-radius:6px;font-size:14px;font-family:inherit;background:#fff;color:#1a1a1a;-webkit-appearance:none}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:#1565c0}
.field textarea{resize:vertical;min-height:70px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.field-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}

/* Leave type grid */
.leave-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:4px}
.leave-opt{border:1.5px solid var(--bd);border-radius:6px;padding:10px 12px;cursor:pointer;display:flex;align-items:center;gap:8px;background:#fff}
.leave-opt.selected{border-color:var(--blue);background:#e8edf5}
.leave-opt input[type=radio]{width:16px;height:16px;accent-color:var(--blue);flex-shrink:0}
.leave-opt span{font-size:13px;font-weight:600;color:#37474f}

/* PPE items table */
.ppe-table{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:8px}
.ppe-table th{background:#f5f5f5;padding:8px 6px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;color:#607d8b;border-bottom:2px solid var(--bd)}
.ppe-table td{padding:4px 4px;border-bottom:1px solid #f0f0f0;vertical-align:middle}
.ppe-table input{width:100%;padding:7px 6px;border:1px solid var(--bd);border-radius:4px;font-size:12px;font-family:inherit}
.ppe-table input:focus{outline:none;border-color:#1565c0}

/* Submit button */
.submit-btn{width:100%;padding:14px;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;color:#fff;margin-top:4px}
.submit-btn.blue{background:var(--blue)}.submit-btn.blue:active{background:#0d1a2e}
.submit-btn.orange{background:var(--orange)}.submit-btn.orange:active{background:#bf360c}
.submit-btn.green{background:var(--green)}.submit-btn.green:active{background:#1b5e20}

/* Success screen */
.success{display:none;text-align:center;padding:40px 20px}
.success .tick{font-size:60px;margin-bottom:16px}
.success h2{font-size:22px;font-weight:900;color:var(--green);margin-bottom:8px}
.success p{font-size:14px;color:#607d8b;line-height:1.6;margin-bottom:20px}
.success .another{padding:12px 24px;background:var(--r);color:#fff;border:none;border-radius:6px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}

/* Error */
.err-bar{display:none;background:#ffebee;border:1px solid #ffcdd2;border-radius:6px;padding:10px 14px;color:#c62828;font-size:13px;margin-bottom:12px}

/* Loading */
.loading{display:none;text-align:center;padding:20px}
.spinner{width:32px;height:32px;border:3px solid #e0e0e0;border-top-color:var(--r);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 10px}
@keyframes spin{to{transform:rotate(360deg)}}

/* Days preview */
.days-preview{background:#e8f5e9;border:1px solid #a5d6a7;border-radius:4px;padding:8px 12px;font-size:12px;color:var(--green);margin-top:6px;display:none}

@media(max-width:400px){
  .form-btns{grid-template-columns:1fr}
  .field-row,.field-row-3{grid-template-columns:1fr}
  .leave-grid{grid-template-columns:1fr}
}
</style>
</head><body>

<header>
  <div class="logo"><div class="lt">K</div><div class="ls">KAEFER</div></div>
  <div class="hm">
    <h1>Submit a Form</h1>
    <p id="hdr-site">KAEFER Integrated Services</p>
  </div>
</header>

<div class="w">

  <!-- Form type selector -->
  <div class="form-btns" id="form-selector">
    <button class="form-btn active-leave" id="btn-leave" onclick="selectForm('leave')">
      <span class="icon">📋</span><span class="lbl">Leave Request</span>
    </button>
    <button class="form-btn" id="btn-ppe" onclick="selectForm('ppe')">
      <span class="icon">🦺</span><span class="lbl">PPE Request</span>
    </button>
    <button class="form-btn" id="btn-purch" onclick="selectForm('purch')">
      <span class="icon">🛒</span><span class="lbl">Purchase / Quote</span>
    </button>
  </div>

  <!-- Error bar -->
  <div class="err-bar" id="err-bar"></div>

  <!-- Loading -->
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div style="color:#607d8b;font-size:13px">Submitting your form...</div>
  </div>

  <!-- Success screen -->
  <div class="success" id="success-screen">
    <div class="tick">✅</div>
    <h2>Form Submitted!</h2>
    <p id="success-msg">Your request has been sent to your supervisor for review.</p>
    <button class="another" onclick="resetForm()">Submit Another Form</button>
  </div>

  <!-- LEAVE FORM -->
  <div id="form-leave">
    <div class="card">
      <div class="card-hdr blue">📋 Leave Application</div>
      <div class="card-body">
        <div class="field-row">
          <div class="field"><label>Full Name *</label><input type="text" id="l-name" placeholder="e.g. John Smith" autocomplete="name"></div>
          <div class="field"><label>Employee Number</label><input type="text" id="l-empno" placeholder="e.g. 03/co233"></div>
        </div>
        <div class="field-row">
          <div class="field"><label>Position / Role</label><input type="text" id="l-pos" placeholder="e.g. Scaffolder Advanced"></div>
          <div class="field"><label>Site</label><input type="text" id="l-site" placeholder="e.g. Yarwun" value="Yarwun"></div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-hdr blue">Type of Leave *</div>
      <div class="card-body">
        <div class="leave-grid">
          <label class="leave-opt" id="lopt-AL"><input type="radio" name="leavetype" value="AL" onchange="selLeave(this)"> <span>Annual Leave</span></label>
          <label class="leave-opt" id="lopt-SL"><input type="radio" name="leavetype" value="SL" onchange="selLeave(this)"> <span>Sick Leave</span></label>
          <label class="leave-opt" id="lopt-BL"><input type="radio" name="leavetype" value="BL" onchange="selLeave(this)"> <span>Bereavement Leave</span></label>
          <label class="leave-opt" id="lopt-X"><input type="radio" name="leavetype" value="X" onchange="selLeave(this)"> <span>Without Pay</span></label>
          <label class="leave-opt" id="lopt-LS"><input type="radio" name="leavetype" value="LS" onchange="selLeave(this)"> <span>Long Service Leave</span></label>
          <label class="leave-opt" id="lopt-IL"><input type="radio" name="leavetype" value="IL" onchange="selLeave(this)"> <span>In Lieu</span></label>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-hdr blue">Leave Dates *</div>
      <div class="card-body">
        <div class="field-row">
          <div class="field"><label>First Day of Leave</label><input type="date" id="l-from" oninput="calcDays()"></div>
          <div class="field"><label>Last Day of Leave</label><input type="date" id="l-to" oninput="calcDays()"></div>
        </div>
        <div class="days-preview" id="days-preview"></div>
        <div class="field" style="margin-top:10px"><label>Notes / Reason (optional)</label><textarea id="l-notes" placeholder="Any additional information..."></textarea></div>
      </div>
    </div>

    <button class="submit-btn blue" onclick="submitLeave()">Submit Leave Request</button>
  </div>

  <!-- PPE FORM -->
  <div id="form-ppe" style="display:none">
    <div class="card">
      <div class="card-hdr orange">🦺 PPE Request</div>
      <div class="card-body">
        <div class="field-row">
          <div class="field"><label>Full Name *</label><input type="text" id="p-name" placeholder="e.g. John Smith" autocomplete="name"></div>
          <div class="field"><label>Employee Number</label><input type="text" id="p-empno" placeholder="e.g. 03/co233"></div>
        </div>
        <div class="field-row">
          <div class="field"><label>Position / Role</label><input type="text" id="p-pos" placeholder="e.g. Scaffolder Advanced"></div>
          <div class="field"><label>Date</label><input type="date" id="p-date"></div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-hdr orange">Items Required *</div>
      <div class="card-body">
        <table class="ppe-table">
          <thead><tr><th style="width:45%">Item Description</th><th style="width:30%">Size / Spec</th><th style="width:15%">Qty</th></tr></thead>
          <tbody id="ppe-rows"></tbody>
        </table>
        <button onclick="addPPERow()" style="background:none;border:1px dashed #bbb;border-radius:4px;padding:6px 12px;font-size:12px;color:#607d8b;cursor:pointer;width:100%;font-family:inherit">+ Add another item</button>
        <div class="field" style="margin-top:12px"><label>Additional Notes</label><textarea id="p-notes" placeholder="Any specific requirements or urgency..."></textarea></div>
      </div>
    </div>

    <button class="submit-btn orange" onclick="submitPPE()">Submit PPE Request</button>
  </div>

  <!-- PURCHASING FORM -->
  <div id="form-purch" style="display:none">
    <div class="card">
      <div class="card-hdr green">🛒 Purchase / Quote Request</div>
      <div class="card-body">
        <div class="field-row">
          <div class="field"><label>Your Name *</label><input type="text" id="pu-name" placeholder="e.g. John Smith" autocomplete="name"></div>
          <div class="field"><label>Date</label><input type="date" id="pu-date"></div>
        </div>
        <div class="field"><label>Supplier *</label><input type="text" id="pu-supplier" placeholder="Supplier name"></div>
        <div class="field"><label>Description *</label><textarea id="pu-desc" placeholder="What do you need ordered or quoted?"></textarea></div>
        <div class="field-row">
          <div class="field"><label>Estimated Cost ($)</label><input type="number" id="pu-cost" placeholder="0.00" min="0" step="0.01"></div>
          <div class="field"><label>PO Number (if known)</label><input type="text" id="pu-po" placeholder="PO-12345"></div>
        </div>
        <div class="field"><label>Reason / Justification</label><textarea id="pu-notes" placeholder="Why is this needed?"></textarea></div>
      </div>
    </div>
    <button class="submit-btn green" onclick="submitPurch()">Submit Purchase Request</button>
  </div>

</div>

<script>
var APPS_URL = 'https://script.google.com/macros/s/AKfycbwnuWO64GNAWHqfECxCfivfxJYCo4YCcrd6c2Gr-IWIqg2SbVA0czJFoR50OSrxuw38/exec';

function getURL(){
  // Try localStorage first (if user has used main tool on same device)
  var u = localStorage.getItem('kaefer_url');
  return u || APPS_URL;
}

// Init
(function(){
  var td = new Date().toISOString().split('T')[0];
  ['p-date','pu-date'].forEach(function(id){var el=document.getElementById(id);if(el)el.value=td;});
  addPPERow();addPPERow();addPPERow();
  // Check URL params for auto-select
  var params = new URLSearchParams(window.location.search);
  var form = params.get('form');
  if(form==='ppe') selectForm('ppe');
  else if(form==='purch') selectForm('purch');
  else selectForm('leave');
  // Try to get site name from main tool localStorage
  var site = localStorage.getItem('kaefer_site');
  if(site) {
    document.getElementById('hdr-site').textContent = site + ' | KAEFER Integrated Services';
    var siteInputs = ['l-site'];
    siteInputs.forEach(function(id){var el=document.getElementById(id);if(el&&!el.value)el.value=site;});
  }
})();

function selectForm(type) {
  ['leave','ppe','purch'].forEach(function(t){
    document.getElementById('form-'+t).style.display = t===type ? '' : 'none';
    var btn = document.getElementById('btn-'+t);
    btn.className = 'form-btn' + (t===type ? ' active-'+t : '');
  });
  document.getElementById('err-bar').style.display='none';
}

function selLeave(radio) {
  document.querySelectorAll('.leave-opt').forEach(function(o){o.classList.remove('selected');});
  radio.closest('.leave-opt').classList.add('selected');
}

function calcDays() {
  var from = document.getElementById('l-from').value;
  var to = document.getElementById('l-to').value;
  var prev = document.getElementById('days-preview');
  if(!from||!to){prev.style.display='none';return;}
  var days=[], cur=new Date(from), end=new Date(to);
  if(cur>end){prev.style.display='none';return;}
  while(cur<=end){var w=cur.getDay();if(w!==0&&w!==6)days.push(cur.toLocaleDateString('en-AU',{day:'2-digit',month:'short'}));cur.setDate(cur.getDate()+1);}
  prev.style.display='';
  prev.textContent = days.length + ' working day' + (days.length!==1?'s':'') + ': ' + days.join(', ');
}

function addPPERow() {
  var tb = document.getElementById('ppe-rows');
  var i = tb.rows.length;
  var tr = tb.insertRow();
  tr.innerHTML = '<td><input type="text" placeholder="e.g. Safety Boots" id="pi-desc-'+i+'"></td>'
    +'<td><input type="text" placeholder="e.g. Size 11.5" id="pi-size-'+i+'"></td>'
    +'<td><input type="number" placeholder="1" min="1" id="pi-qty-'+i+'" style="width:100%"></td>';
}

function showErr(msg){
  var e=document.getElementById('err-bar');
  e.style.display='';e.textContent='⚠️ '+msg;
  window.scrollTo(0,0);
}

function showLoading(v){document.getElementById('loading').style.display=v?'':'none';}

function showSuccess(msg){
  document.getElementById('form-selector').style.display='none';
  document.getElementById('loading').style.display='none';
  ['leave','ppe','purch'].forEach(function(t){document.getElementById('form-'+t).style.display='none';});
  document.getElementById('success-msg').textContent=msg||'Your request has been submitted successfully.';
  document.getElementById('success-screen').style.display='';
  window.scrollTo(0,0);
}

function resetForm(){
  document.getElementById('success-screen').style.display='none';
  document.getElementById('form-selector').style.display='';
  selectForm('leave');
  // Reset fields
  document.querySelectorAll('input[type=text],input[type=number],textarea').forEach(function(el){if(el.id!=='l-site')el.value='';});
  document.querySelectorAll('input[type=radio]').forEach(function(el){el.checked=false;});
  document.querySelectorAll('.leave-opt').forEach(function(o){o.classList.remove('selected');});
  document.getElementById('ppe-rows').innerHTML='';
  addPPERow();addPPERow();addPPERow();
  var td=new Date().toISOString().split('T')[0];
  ['p-date','pu-date'].forEach(function(id){var el=document.getElementById(id);if(el)el.value=td;});
}

function postToApps(payload) {
  var u = getURL();
  return fetch(u, {
    method:'POST',
    redirect:'follow',
    headers:{'Content-Type':'text/plain'},
    body: JSON.stringify(payload)
  }).then(function(r){return r.json();});
}

function submitLeave() {
  var name = document.getElementById('l-name').value.trim();
  var leaveType = document.querySelector('input[name=leavetype]:checked');
  var from = document.getElementById('l-from').value;
  var to = document.getElementById('l-to').value;
  if(!name){showErr('Please enter your full name.');return;}
  if(!leaveType){showErr('Please select a leave type.');return;}
  if(!from||!to){showErr('Please enter your leave dates.');return;}
  if(new Date(from)>new Date(to)){showErr('First day cannot be after last day.');return;}
  var days=0,cur=new Date(from),end=new Date(to);
  while(cur<=end){if(cur.getDay()!==0&&cur.getDay()!==6)days++;cur.setDate(cur.getDate()+1);}
  var leaveLabels={AL:'Annual Leave',SL:'Sick Leave',BL:'Bereavement Leave',X:'Without Pay',LS:'Long Service Leave',IL:'In Lieu'};
  var data = {
    name:name,
    employeeNumber:document.getElementById('l-empno').value.trim(),
    position:document.getElementById('l-pos').value.trim(),
    site:document.getElementById('l-site').value.trim(),
    leaveType:leaveLabels[leaveType.value]||leaveType.value,
    leaveCode:leaveType.value,
    firstDay:new Date(from).toLocaleDateString('en-AU',{day:'2-digit',month:'short',year:'numeric'}),
    lastDay:new Date(to).toLocaleDateString('en-AU',{day:'2-digit',month:'short',year:'numeric'}),
    workingDays:days,
    notes:document.getElementById('l-notes').value.trim()
  };
  document.getElementById('err-bar').style.display='none';
  showLoading(true);
  // Save submission + send email
  postToApps({action:'save_submission', formType:'leave', data:data})
  .then(function(){return postToApps({action:'send_email', emailType:'leave', data:data});})
  .then(function(j){
    showLoading(false);
    if(j.ok||true) showSuccess('Your leave request has been submitted. Your supervisor will review it shortly.');
  })
  .catch(function(err){showLoading(false);showErr('Submission failed: '+err.message);});
}

function submitPPE() {
  var name = document.getElementById('p-name').value.trim();
  if(!name){showErr('Please enter your full name.');return;}
  var rows = document.getElementById('ppe-rows').rows;
  var items = [];
  for(var i=0;i<rows.length;i++){
    var desc=document.getElementById('pi-desc-'+i);
    var size=document.getElementById('pi-size-'+i);
    var qty=document.getElementById('pi-qty-'+i);
    if(desc&&desc.value.trim())items.push({desc:desc.value.trim(),size:size?size.value.trim():'',qty:qty?qty.value:''});
  }
  if(!items.length){showErr('Please add at least one PPE item.');return;}
  var data = {
    name:name,
    employeeNumber:document.getElementById('p-empno').value.trim(),
    position:document.getElementById('p-pos').value.trim(),
    date:document.getElementById('p-date').value,
    items:items,
    notes:document.getElementById('p-notes').value.trim()
  };
  document.getElementById('err-bar').style.display='none';
  showLoading(true);
  postToApps({action:'save_submission', formType:'ppe', data:data})
  .then(function(){return postToApps({action:'send_email', emailType:'ppe', data:data});})
  .then(function(){showLoading(false);showSuccess('Your PPE request has been submitted. Your supervisor will review and action it shortly.');})
  .catch(function(err){showLoading(false);showErr('Submission failed: '+err.message);});
}

function submitPurch() {
  var name = document.getElementById('pu-name').value.trim();
  var supplier = document.getElementById('pu-supplier').value.trim();
  var desc = document.getElementById('pu-desc').value.trim();
  if(!name){showErr('Please enter your name.');return;}
  if(!supplier){showErr('Please enter the supplier name.');return;}
  if(!desc){showErr('Please describe what you need.');return;}
  var data = {
    name:name,
    supplier:supplier,
    description:desc,
    date:document.getElementById('pu-date').value,
    cost:document.getElementById('pu-cost').value,
    poNumber:document.getElementById('pu-po').value.trim(),
    notes:document.getElementById('pu-notes').value.trim()
  };
  document.getElementById('err-bar').style.display='none';
  showLoading(true);
  postToApps({action:'save_submission', formType:'purch', data:data})
  .then(function(){return postToApps({action:'send_email', emailType:'ppe', data:Object.assign({},data,{items:[{desc:desc}],itemsText:desc})});})
  .then(function(){showLoading(false);showSuccess('Your purchase request has been submitted. Your supervisor will review it shortly.');})
  .catch(function(err){showLoading(false);showErr('Submission failed: '+err.message);});
}
</script>
</body></html>
